{% extends "base.html" %}
{% block title %}登入 — Games Platform{% endblock %}
{% block body %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🎮</div>
            <h1>Games Platform</h1>
            <p class="auth-subtitle">登入您的帳號開始遊戲</p>
        </div>
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="username">帳號</label>
                <input type="text" id="username" name="username" placeholder="請輸入帳號" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" placeholder="請輸入密碼" required autocomplete="current-password">
            </div>
            <div id="errorMsg" class="error-msg" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-full">登入</button>
        </form>
        <div class="auth-footer">
            <span>還沒有帳號？</span>
            <a href="/register">立即註冊</a>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="/static/js/auth.js"></script>
{% endblock %}
