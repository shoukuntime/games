<!-- Floating chat -->
<button class="chat-float-btn" id="chatToggle" onclick="toggleChat()">
    💬
    <span class="chat-badge" id="chatBadge" style="display:none">0</span>
</button>
<div class="chat-panel" id="chatPanel">
    <div class="chat-panel-header">
        <span class="panel-icon">💬</span> <span>Chat</span>
        <button class="chat-panel-close" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
        <input type="text" id="chatInput" placeholder="Aa" autocomplete="off">
        <button class="chat-send-btn" id="chatSendBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>
