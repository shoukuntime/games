<!-- Floating chat -->
<button class="chat-float-btn" id="chatToggle" onclick="toggleChat()">💬<span class="chat-badge" id="chatBadge" style="display:none">0</span></button>
<div class="chat-panel" id="chatPanel">
    <div class="chat-panel-header">
        <span>💬 Chat</span>
        <button class="chat-panel-close" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="..." autocomplete="off">
        <button id="chatSendBtn">→</button>
    </div>
</div>
