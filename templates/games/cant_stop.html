{% extends "base.html" %}
{% block title %}Can't Stop — Games Platform{% endblock %}
{% block body %}
<nav class="navbar">
    <a href="/dashboard" class="nav-brand">🎮 Games Platform</a>
    <div class="nav-right">
        <div class="lang-switcher">
            <button class="lang-btn" onclick="this.nextElementSibling.classList.toggle('show')">🌐 <span id="langLabel">中文</span> ▾</button>
            <div class="lang-dropdown"><div onclick="setLang('zh-TW')">中文</div><div onclick="setLang('en')">English</div><div onclick="setLang('ja')">日本語</div></div>
        </div>
        <button class="nav-help" onclick="showHelp('cant-stop')" title="How to Play">❓</button>
        <span class="nav-user">{{ user.username }}</span>
    </div>
</nav>
<main class="game-page cantstop-page">
    <div class="cs-layout">
        <div class="cs-sidebar">
            <h3 data-i18n="cs.players">玩家</h3>
            <div id="csPlayers"></div>
        </div>
        <div class="cs-center">
            <div id="csMobilePlayers" class="mobile-players-bar"></div>
            <div id="csTurnInfo" class="turn-info"></div>
            <div id="csBoard" class="cs-board"></div>
            <div id="csDice" class="cs-dice-area"></div>
            <div id="csPairings" class="cs-pairings" style="display:none"></div>
            <div id="csActions" class="cs-actions">
                <button class="btn btn-primary" id="rollBtn" data-i18n="cs.roll" onclick="rollDice()">🎲 擲骰子</button>
                <button class="btn btn-secondary" id="stopBtn" data-i18n="cs.stop" onclick="stopTurn()" style="display:none">✋ 停止</button>
            </div>
            <div id="csMessage" class="game-message"></div>
        </div>
    </div>
</main>
{% include "chat_panel.html" %}
{% endblock %}
{% block extra_js %}
<script>const ROOM_ID = "{{ room_id }}"; const USERNAME = "{{ user.username }}";</script>
<script src="/static/js/games/cant_stop.js"></script>
{% endblock %}
