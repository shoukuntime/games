{% extends "base.html" %}
{% block title %}猜數字 — Games Platform{% endblock %}
{% block body %}
<nav class="navbar">
    <a href="/dashboard" class="nav-brand">🎮 Games Platform</a>
    <div class="nav-right">
        <span class="nav-user">{{ user.username }}</span>
        <button class="btn btn-outline btn-sm" onclick="logout()">登出</button>
    </div>
</nav>
<main class="main-content">
    <div class="game-container">
        <div class="game-header">
            <h1>🔢 猜數字</h1>
            <p>我心中想了一個 1 到 100 的數字，猜猜看是多少？</p>
        </div>
        <div class="game-body">
            <div id="gameArea">
                <div class="guess-input-group">
                    <input type="number" id="guessInput" min="1" max="100" placeholder="輸入 1-100">
                    <button class="btn btn-primary" id="guessBtn" onclick="makeGuess()">猜！</button>
                </div>
                <div id="message" class="game-message"></div>
                <div class="game-stats">
                    <span>已猜次數：<strong id="attempts">0</strong></span>
                </div>
                <div id="history" class="guess-history"></div>
            </div>
            <button class="btn btn-secondary" onclick="resetGame()">重新開始</button>
        </div>
        <a href="/dashboard" class="back-link">← 返回遊戲大廳</a>
    </div>
</main>
{% endblock %}
{% block extra_js %}
<script src="/static/js/games/guess_number.js"></script>
<script>
async function logout() {
    await fetch('/api/v1/auth/logout', { method: 'POST' });
    window.location.href = '/';
}
</script>
{% endblock %}
